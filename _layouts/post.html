---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  <p class="post-date">
    {{ page.date | date: "%B %d, %Y" }}
  </p>

  {% if page.image %}
    <img src="{{ page.image | relative_url }}" alt="{{ page.title }}">
  {% endif %}

  <div class="post-content">
    {{ content }}
  </div>
</article>
